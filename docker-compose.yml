services:
  redis:
    image: redis:7-alpine
    container_name: surveillance_redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: surveillance_backend
    environment:
      REDIS_BROKER_URL: redis://redis:6379/0
      REDIS_RESULT_BACKEND: redis://redis:6379/0
      NEXT_PUBLIC_BACKEND_URL: http://backend:8001
      SHARED_SESSIONS_DIR: /shared/sessions
      MATCH_SNAPSHOT_DIR: /app/output/snapshots
      YOLO_MODEL_PATH: /models/yolov8n.pt
      DATA_RETENTION_HOURS: "4"
    volumes:
      - ./backend:/app
      - ./data:/models
      - deepface_cache:/root/.deepface
      - sessions_data:/shared/sessions
      - output_data:/app/output
    ports:
      - "8001:8001"
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn app:app --host 0.0.0.0 --port 8001
    restart: unless-stopped

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: surveillance_celery_worker
    environment:
      REDIS_BROKER_URL: redis://redis:6379/0
      REDIS_RESULT_BACKEND: redis://redis:6379/0
      SHARED_SESSIONS_DIR: /shared/sessions
      MATCH_SNAPSHOT_DIR: /app/output/snapshots
      YOLO_MODEL_PATH: /models/yolov8n.pt
      DATA_RETENTION_HOURS: "4"
    volumes:
      - ./backend:/app
      - ./data:/models
      - deepface_cache:/root/.deepface
      - sessions_data:/shared/sessions
      - output_data:/app/output
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    command: celery -A tasks.celery_app worker --loglevel=INFO --concurrency=1
    restart: unless-stopped

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: surveillance_celery_beat
    environment:
      REDIS_BROKER_URL: redis://redis:6379/0
      REDIS_RESULT_BACKEND: redis://redis:6379/0
      SHARED_SESSIONS_DIR: /shared/sessions
      MATCH_SNAPSHOT_DIR: /app/output/snapshots
      YOLO_MODEL_PATH: /models/yolov8n.pt
      DATA_RETENTION_HOURS: "4"
    volumes:
      - ./backend:/app
      - ./data:/models
      - sessions_data:/shared/sessions
      - output_data:/app/output
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A tasks.celery_app beat --loglevel=INFO
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: surveillance_frontend
    environment:
      NEXT_PUBLIC_BACKEND_URL: http://localhost:8001
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started
    command: npm run start
    restart: unless-stopped

volumes:
  redis_data:
  sessions_data:
  output_data:
  deepface_cache:
